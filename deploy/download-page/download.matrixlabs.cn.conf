# TLAH Studio public landing page and release file hosting
# https://download.matrixlabs.cn/

server {
    listen 80;
    listen [::]:80;
    server_name download.matrixlabs.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name download.matrixlabs.cn;

    ssl_certificate /etc/letsencrypt/live/download.matrixlabs.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/download.matrixlabs.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/download_matrixlabs_cn_access.log;
    error_log /var/log/nginx/download_matrixlabs_cn_error.log;

    location /tlah/windows/ {
        alias /var/www/download/tlah/windows/;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        types {
            application/octet-stream exe;
            application/json json;
            text/plain sig;
        }
        default_type application/octet-stream;
    }

    location /files/ {
        alias /var/www/download/tlah/windows/;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        types {
            application/octet-stream exe;
            application/json json;
            text/plain sig;
        }
        default_type application/octet-stream;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3131;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:3131;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3131;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
