name: Feature request
description: Propose a focused product improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: Describe the user problem before prescribing an implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who is affected and what cannot be done reliably today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable success.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional UI, API, data, or workflow suggestion.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: impact
    attributes:
      label: Impact areas
      options:
        - label: UI or accessibility
        - label: Agent behavior or model context
        - label: Tool permissions or security
        - label: Persistence or migration
        - label: External service or protocol
        - label: Packaging or update compatibility
