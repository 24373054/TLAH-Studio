name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-release:
    name: Windows x64 release gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Validate documentation
        shell: pwsh
        run: ./tools/validate-docs.ps1

      - name: Run repository CI gate
        shell: pwsh
        run: ./tools/ci.ps1 -Configuration Release -Platform x64
